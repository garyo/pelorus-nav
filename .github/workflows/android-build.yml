name: Android APK (ad-hoc)

# Build a signed release APK on demand WITHOUT cutting a public release.
# Triggered manually (workflow_dispatch) from any branch/ref; the APK is
# published as a DRAFT pre-release so it can be downloaded directly on-device
# (a plain .apk asset, not a zipped run artifact). It uses one rolling tag
# `adhoc` — never `v*` — recreated each run, so there's always exactly one
# ad-hoc draft (the latest) instead of a pile-up, and it can't trigger
# release.yml even if published. As a draft its tag ref isn't created at all.
# The build's commit is in the asset filename, title, and notes.
# Deliberately separate from release.yml (v* tag → public Release) and
# release-ios.yml (TestFlight) so an ad-hoc Android build touches neither.
#
# Signed with the same release keystore as release.yml, so it installs OVER an
# existing release build in place (same signature) — app data is preserved. The
# versionCode uses the commit count (identical scheme to release.yml) so a real
# release from the same or a later commit will still upgrade this build.
#
# One-time setup: the signing secrets live in the `release` GitHub environment,
# which is restricted to v* tag refs. To let this workflow run from a branch,
# add that branch (e.g. main) to the environment's allowed deployment branches
# and tags: Settings → Environments → release → Deployment branches and tags.

on:
  workflow_dispatch:

permissions:
  contents: write # gh release create (draft pre-release)

jobs:
  build-apk:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # full history → versionCode from commit count

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      # Cache ~/.gradle (dependencies + wrapper distribution) and Gradle's local
      # build cache across runs. On a cold runner the Gradle phase is ~150s,
      # almost all of it re-downloading deps and recompiling the unchanging
      # Capacitor plugin modules; with this warm, repeat runs land much faster.
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compute Android version
        run: |
          echo "ANDROID_VERSION_CODE=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "ANDROID_VERSION_NAME=${PKG_VERSION}-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build web + sync Android
        run: |
          CAPACITOR=1 bun run build
          bunx cap sync android

      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/pelorus-release.keystore

      - name: Write signing.properties
        run: |
          cat > android/signing.properties <<EOF
          storeFile=pelorus-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed release APK
        working-directory: android
        # --build-cache: pull unchanged tasks (e.g. the Capacitor plugin
        # compiles) from the cache setup-gradle persists between runs.
        run: ./gradlew assembleRelease --build-cache

      # Rename to a clear, tappable .apk filename for the release asset.
      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk "pelorus-nav-${SHORT_SHA}.apk"

      # Publish as a draft pre-release so the APK downloads directly on-device
      # (no zip). One rolling `adhoc` tag: delete the previous draft, then create
      # the new one — so only the latest ad-hoc build is ever listed.
      - name: Publish draft pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="adhoc"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" "pelorus-nav-${SHORT_SHA}.apk" \
            --target "$GITHUB_SHA" \
            --draft --prerelease \
            --title "Ad-hoc build ${ANDROID_VERSION_NAME}" \
            --notes "Unlisted latest ad-hoc Android build from \`${SHORT_SHA}\` (branch \`${GITHUB_REF_NAME}\`). Release-signed — installs over an existing release build with app data preserved. Not a public release."
          echo "Draft pre-release: $(gh release view "$TAG" --json url --jq .url)"
