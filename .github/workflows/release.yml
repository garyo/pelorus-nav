name: Release APK

on:
  push:
    tags: ["v*"]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web + sync Android
        run: |
          bun run build
          bunx cap sync android

      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/pelorus-release.keystore

      - name: Write signing.properties
        run: |
          cat > android/signing.properties <<EOF
          storeFile=pelorus-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk pelorus-nav.apk
          gh release create "${{ github.ref_name }}" \
            pelorus-nav.apk \
            --title "Pelorus Nav ${{ github.ref_name }}" \
            --generate-notes
