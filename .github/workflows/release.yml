name: Release APK

on:
  push:
    tags: ["v*"]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    env:
      # secrets aren't usable in step `if:` expressions; mirrored here so the
      # Play upload step can skip cleanly when the secret is unconfigured.
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # full history → versionCode from commit count

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Compute Android version
        run: |
          echo "ANDROID_VERSION_CODE=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build web + sync Android
        run: |
          CAPACITOR=1 bun run build
          bunx cap sync android

      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/pelorus-release.keystore

      - name: Write signing.properties
        run: |
          cat > android/signing.properties <<EOF
          storeFile=pelorus-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed release APK + AAB
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease

      # Publishes to the Play Store internal testing track. Promotion to
      # closed/production stays a manual step in the Play Console. Skipped
      # (not failed) while the PLAY_SERVICE_ACCOUNT_JSON secret is absent,
      # so the release still works if Play publishing is ever unconfigured.
      - name: Upload AAB to Play internal track
        if: ${{ env.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: nav.pelorus.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk pelorus-nav.apk
          mv android/app/build/outputs/bundle/release/app-release.aab \
            "pelorus-nav-${ANDROID_VERSION_NAME}-${ANDROID_VERSION_CODE}.aab"
          gh release create "${{ github.ref_name }}" \
            pelorus-nav.apk \
            "pelorus-nav-${ANDROID_VERSION_NAME}-${ANDROID_VERSION_CODE}.aab" \
            --title "Pelorus Nav ${{ github.ref_name }}" \
            --generate-notes
