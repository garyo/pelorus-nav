name: iOS TestFlight

# Build a signed iOS app and upload it to TestFlight.
#
# Triggers: manually (workflow_dispatch) for ad-hoc betas, or on a v* release
# tag (ships iOS alongside the Android release.yml).
#
# Signing is handcrafted (no fastlane/match) and fully MANUAL: the Apple
# Distribution cert + private key are imported from a base64 secret into a temp
# keychain, a committed-as-a-secret App Store provisioning profile is installed,
# and the archive is pinned to both (no -allowProvisioningUpdates). This is
# deliberate: automatic signing minted a throwaway "Apple Development" cert on
# every run (the project's Release config uses that identity), which eventually
# hit Apple's per-account certificate cap. The App Store Connect API key is used
# only for the altool upload, not for provisioning.
#
# Required repository secrets (Settings → Secrets → Actions, "release" env):
#   IOS_DIST_CERT_P12          base64 of the Apple Distribution cert exported
#                              from Keychain Access as .p12 (include private key)
#   IOS_DIST_CERT_PASSWORD     the password set when exporting that .p12
#   IOS_APPSTORE_PROFILE_BASE64 base64 of the App Store .mobileprovision for
#                              com.darkstarsystems.pelorus.app (Distribution →
#                              App Store Connect profile using the cert above)
#   ASC_API_KEY_P8             base64 of the App Store Connect API key AuthKey_*.p8
#   ASC_KEY_ID                 API key id (e.g. 2X9ABC1DEF)
#   ASC_ISSUER_ID              API issuer id (uuid)
#   KEYCHAIN_PASSWORD          any value (unlocks the temp keychain)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

env:
  TEAM_ID: "4LRRTL3H3R" # darkstar (App Store team); not secret
  BUNDLE_ID: "com.darkstarsystems.pelorus.app"
  APPLE_ID: "6781294138" # numeric App Store id; passed to altool so it doesn't
  # have to resolve the app from the bundle id (that lookup intermittently fails
  # with "Cannot determine the Apple ID from Bundle ID" / error 19)

jobs:
  testflight:
    runs-on: macos-26 # Xcode 26 — Apple requires the iOS 26 SDK for uploads
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # full history → build number from commit count

      - name: Select latest Xcode
        run: |
          LATEST="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          echo "Using $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Import Apple Distribution certificate
        env:
          CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          CERT_PW: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PW: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT="$RUNNER_TEMP/dist.p12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo -n "$CERT_P12" | base64 --decode > "$CERT"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$CERT" -P "$CERT_PW" -A -t cert -f pkcs12 \
            -T /usr/bin/codesign -k "$KEYCHAIN"
          # Make the new keychain part of the search list so xcodebuild finds the cert.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          # Allow codesign to use the imported key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          echo "BUILD_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Place App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$DIR"
          echo -n "$ASC_API_KEY_P8" | base64 --decode > "$DIR/AuthKey_${ASC_KEY_ID}.p8"
          echo "ASC_KEY_PATH=$DIR/AuthKey_${ASC_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Install App Store provisioning profile
        env:
          PROFILE_B64: ${{ secrets.IOS_APPSTORE_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PROFILE="$RUNNER_TEMP/appstore.mobileprovision"
          echo -n "$PROFILE_B64" | base64 --decode > "$PROFILE"
          # The profile is CMS-signed; decode to plist to read its name + uuid.
          PLIST="$(security cms -D -i "$PROFILE")"
          NAME="$(echo "$PLIST" | plutil -extract Name raw -o - -)"
          UUID="$(echo "$PLIST" | plutil -extract UUID raw -o - -)"
          DEST="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$DEST"
          cp "$PROFILE" "$DEST/$UUID.mobileprovision"
          echo "Installed provisioning profile '$NAME' ($UUID)"
          echo "PROFILE_NAME=$NAME" >> "$GITHUB_ENV"

      - name: Build web + sync iOS
        run: |
          CAPACITOR=1 bun run build
          bunx cap sync ios
          # The Xcode project's base configuration file is gitignored and
          # generated — without it the archive fails before the command-line
          # version overrides are even consulted.
          bun tools/sync-ios-version.ts

      - name: Archive, export, and upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          KEYCHAIN_PW: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          MARKETING_VERSION="$(node -p "require('./package.json').version")"
          echo "Building $MARKETING_VERSION ($BUILD_NUMBER)"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          security unlock-keychain -p "$KEYCHAIN_PW" "$BUILD_KEYCHAIN"

          cd ios/App

          # Manual signing: pin to the imported Apple Distribution cert + the
          # installed App Store profile. No -allowProvisioningUpdates, so
          # xcodebuild never creates a certificate (automatic signing was
          # minting a throwaway Apple Development cert every run). Overrides are
          # passed on the command line only — the project file stays automatic
          # so local dev builds are unaffected.
          xcodebuild -project App.xcodeproj -scheme App -configuration Release \
            -archivePath build/App.xcarchive -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $BUILD_KEYCHAIN" \
            archive

          # Manual export options, generated here so the profile name matches the
          # one just installed (the committed ExportOptions.plist stays automatic
          # for local ios-beta.sh use).
          cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>destination</key><string>export</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict><key>$BUNDLE_ID</key><string>$PROFILE_NAME</string></dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive -archivePath build/App.xcarchive \
            -exportPath build/export -exportOptionsPlist build/ExportOptions.plist

          xcrun altool --upload-app -f build/export/*.ipa -t ios --apple-id "$APPLE_ID" \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      # altool only uploads — it never assigns the build to a TestFlight group
      # or submits it, so every build otherwise lands "Ready to Submit" and
      # needs a manual add-to-group + Submit-for-Review. Do that here via the
      # App Store Connect API (same key). Fail-soft: a distribution hiccup logs
      # a warning but never fails an otherwise-successful upload.
      #
      # One-time setup in App Store Connect or the auto-submit is rejected: fill
      # Beta App Review Information + the group's "What to Test".
      - name: Distribute to external testers + submit for Beta App Review
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          # ASC_KEY_PATH, BUNDLE_ID, BUILD_NUMBER come from $GITHUB_ENV / env.
          BETA_GROUP: "Beta Testers"
        run: node tools/ios/testflight-submit.mjs
