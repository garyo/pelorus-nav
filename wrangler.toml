#:schema node_modules/wrangler/config-schema.json
name = "pelorus-nav"
# account_id set via CLOUDFLARE_ACCOUNT_ID env var
compatibility_date = "2025-09-23"
main = "src/worker.ts"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Serve .html files at their exact URLs. The default "auto-trailing-slash"
# 307-redirects /index.html → "/" — which the worker rewrites to the landing
# page, so the service worker's precache fetch of /index.html would cache the
# LANDING page as the app shell and serve it for every /app navigation.
html_handling = "none"
# The worker must run on EVERY request. With a run_worker_first *list*,
# non-listed paths are handled by the asset layer alone — its SPA fallback
# answers missing paths (including the R2-served *.pmtiles) with index.html
# and the worker's R2/tile routing never executes (this silently broke all
# streamed charts 2026-07-10 → 07-13). The worker already forwards unmatched
# paths to the ASSETS binding, so worker-first everywhere is safe.
run_worker_first = true

[[r2_buckets]]
binding = "TILES"
bucket_name = "pelorus-nav"

# Landing-page newsletter signups (see handleSubscribe in src/worker.ts)
[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "56c1f5b0796f4b7ea89a27ace5ed04d4"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
