<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Pillar: black-yellow-black bands -->
  <rect x="10" y="12" width="12" height="18" rx="1" fill="#222222" stroke="#000" stroke-width="2"/>
  <rect x="11" y="18" width="10" height="6" fill="#ffdd00"/>
  <!-- Top marks: triangles pointing apart (up and down) -->
  <polygon points="12,7 16,3 20,7" fill="#222222" stroke="#000" stroke-width="1.5"/>
  <polygon points="12,8 20,8 16,12" fill="#222222" stroke="#000" stroke-width="1.5"/>
</svg>
