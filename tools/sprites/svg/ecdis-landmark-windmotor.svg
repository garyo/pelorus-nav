<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Wind turbine / windmotor: pole with 3 blades -->
  <line x1="16" y1="12" x2="16" y2="30" stroke="#000" stroke-width="2"/>
  <!-- Hub -->
  <circle cx="16" cy="12" r="2" fill="#000"/>
  <!-- Blades -->
  <line x1="16" y1="12" x2="16" y2="2" stroke="#000" stroke-width="2"/>
  <line x1="16" y1="12" x2="7" y2="17" stroke="#000" stroke-width="2"/>
  <line x1="16" y1="12" x2="25" y2="17" stroke="#000" stroke-width="2"/>
</svg>
