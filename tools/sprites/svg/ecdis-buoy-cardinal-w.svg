<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Pillar: yellow-black-yellow bands -->
  <rect x="10" y="12" width="12" height="18" rx="1" fill="#ffdd00" stroke="#000" stroke-width="2"/>
  <rect x="11" y="18" width="10" height="6" fill="#222222"/>
  <!-- Top marks: triangles pointing together (down then up) -->
  <polygon points="12,3 20,3 16,7" fill="#222222" stroke="#000" stroke-width="1.5"/>
  <polygon points="12,12 16,8 20,12" fill="#222222" stroke="#000" stroke-width="1.5"/>
</svg>
