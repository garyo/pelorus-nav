<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Pillar: upper black, lower yellow -->
  <rect x="10" y="12" width="12" height="18" rx="1" fill="#ffdd00" stroke="#000" stroke-width="2"/>
  <rect x="11" y="13" width="10" height="8" fill="#222222"/>
  <!-- Two upward-pointing triangles on top -->
  <polygon points="12,10 16,4 20,10" fill="#222222" stroke="#000" stroke-width="1.5"/>
