<?xml version="1.0" encoding="UTF-8"?>
<?xml-stylesheet href="daySvgStyle.css" type="text/css"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.2" baseProfile="tiny" xml:space="preserve" shape-rendering="geometricPrecision" fill-rule="evenodd" width="6mm" height="6mm" viewBox="-3 -3 6 6">
  <title>ISODGR01</title>
  <desc>isolated danger symbol — magenta octagon with white cross</desc>
  <!-- Octagon: magenta fill, black outline -->
  <!-- Octagon with points at top/bottom/left/right -->
  <polygon class="fISDNG" points="0,-2.5 1.8,-1.8 2.5,0 1.8,1.8 0,2.5 -1.8,1.8 -2.5,0 -1.8,-1.8"/>
  <polygon class="sCHBLK" fill="none" points="0,-2.5 1.8,-1.8 2.5,0 1.8,1.8 0,2.5 -1.8,1.8 -2.5,0 -1.8,-1.8" stroke-width="0.3"/>
  <!-- White X (45° cross) -->
  <line class="sCHWHT" x1="-1.3" y1="-1.3" x2="1.3" y2="1.3" stroke-width="0.55"/>
  <line class="sCHWHT" x1="1.3" y1="-1.3" x2="-1.3" y2="1.3" stroke-width="0.55"/>
  <circle class="pivotPoint layout" fill="none" cx="0" cy="0" r="1"/>
</svg>
