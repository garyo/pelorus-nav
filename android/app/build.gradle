apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

// Load release signing config from local properties file (not in git)
def signingPropsFile = rootProject.file("signing.properties")
def signingProps = new Properties()
if (signingPropsFile.exists()) {
    signingProps.load(new FileInputStream(signingPropsFile))
}

// versionCode/versionName: CI (release.yml) exports ANDROID_VERSION_CODE from
// `git rev-list --count HEAD` and ANDROID_VERSION_NAME from the release tag,
// so every release APK gets a monotonically increasing code and a real
// version name. Local/debug builds fall back to a git-derived count (or 1
// outside a git checkout) and the package.json version (or "1.0").
def resolveVersionCode = {
    def envValue = System.getenv('ANDROID_VERSION_CODE')
    if (envValue) return envValue.toInteger()
    try {
        def stdout = new ByteArrayOutputStream()
        exec {
            commandLine 'git', 'rev-list', '--count', 'HEAD'
            standardOutput = stdout
        }
        def count = stdout.toString().trim().toInteger()
        if (count > 0) return count
    } catch (Exception ignored) {
        // no git history available (e.g. a source tarball) — fall back below
    }
    return 1
}

def resolveVersionName = {
    def envValue = System.getenv('ANDROID_VERSION_NAME')
    if (envValue) return envValue
    try {
        def pkgJson = new groovy.json.JsonSlurper().parse(file('../../package.json'))
        if (pkgJson.version) return pkgJson.version.toString()
    } catch (Exception ignored) {
        // package.json missing/unreadable — fall back below
    }
    return '1.0'
}

android {
    namespace = "nav.pelorus.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "nav.pelorus.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode resolveVersionCode()
        versionName resolveVersionName()
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    if (signingProps['storeFile']) {
        signingConfigs {
            release {
                storeFile file("../${signingProps['storeFile']}")
                storePassword signingProps['storePassword']
                keyAlias signingProps['keyAlias']
                keyPassword signingProps['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (signingProps['storeFile']) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation 'com.google.android.gms:play-services-location:21.3.0'
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
